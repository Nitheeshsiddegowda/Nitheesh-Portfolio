<section id="certs">
  <div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow">Certifications</span>
      <h2>Learning, <em>logged</em></h2>
    </div>

    <div class="cert-grid reveal-stagger reveal">
      {% for cert in data.certifications %}
      <div class="cert-card">
        <div class="cert-icon">{{ cert.icon }}</div>
        <div>
          <h4>{{ cert.name }}</h4>
          <div class="meta">{{ cert.issuer }} · {{ cert.year }}</div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
